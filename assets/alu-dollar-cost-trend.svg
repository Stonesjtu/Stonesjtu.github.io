<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Estimated raw FP16 ALU cost over process generations</title>
  <desc id="desc">A log-scale line chart showing estimated raw cost per one million FP16 multiply-add datapaths from 45nm to N2, with an Intel 18A comparison point.</desc>
  <rect width="920" height="520" fill="#f8fafc"/>

  <text x="70" y="42" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Estimated raw FP16 ALU dollar cost over time</text>
  <text x="70" y="70" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="13">FP16 add + multiply datapath area is scaled from a 45nm Horowitz anchor by public logic-density estimates. Cost is raw wafer-area proxy.</text>

  <rect x="68" y="92" width="784" height="370" rx="8" fill="#ffffff" stroke="#d7dee8"/>

  <g stroke="#e5ebf3" stroke-width="1">
    <line x1="100" y1="118" x2="830" y2="118"/>
    <line x1="100" y1="214.3" x2="830" y2="214.3"/>
    <line x1="100" y1="310.5" x2="830" y2="310.5"/>
    <line x1="100" y1="406.8" x2="830" y2="406.8"/>
  </g>
  <g stroke="#7b8798" stroke-width="2">
    <line x1="100" y1="118" x2="100" y2="428"/>
    <line x1="100" y1="428" x2="830" y2="428"/>
  </g>

  <g fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="11">
    <text x="62" y="122">100</text>
    <text x="68" y="218">60</text>
    <text x="68" y="315">36</text>
    <text x="68" y="411">22</text>
    <text x="90" y="448">2007</text>
    <text x="205" y="448">2010</text>
    <text x="397" y="448">2015</text>
    <text x="512" y="448">2018</text>
    <text x="589" y="448">2020</text>
    <text x="743" y="448">2024</text>
    <text x="820" y="448">2026</text>
  </g>

  <text x="120" y="120" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="12">USD per 1M raw FP16 mul+add datapaths, log scale</text>

  <polyline points="100.0,149.3 215.3,244.0 407.4,309.5 522.6,370.2 599.5,331.5 753.2,392.9 830.0,385.0" fill="none" stroke="#d1495b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="753.2" y1="392.9" x2="830.0" y2="385.0" stroke="#d1495b" stroke-width="4" stroke-dasharray="8 7" stroke-linecap="round"/>

  <g fill="#d1495b" stroke="#ffffff" stroke-width="2">
    <circle cx="100.0" cy="149.3" r="5"/>
    <circle cx="215.3" cy="244.0" r="5"/>
    <circle cx="407.4" cy="309.5" r="5"/>
    <circle cx="522.6" cy="370.2" r="5"/>
    <circle cx="599.5" cy="331.5" r="5"/>
    <circle cx="753.2" cy="392.9" r="5"/>
    <circle cx="830.0" cy="385.0" r="5"/>
  </g>

  <g fill="#2f80ed" stroke="#ffffff" stroke-width="2">
    <circle cx="830.0" cy="331.5" r="6"/>
  </g>

  <g fill="#172033" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">
    <text x="112" y="144">45nm</text>
    <text x="112" y="158">$85</text>
    <text x="226" y="239">28nm</text>
    <text x="226" y="253">$52</text>
    <text x="372" y="304">16nm</text>
    <text x="372" y="318">$37</text>
    <text x="534" y="365">7nm</text>
    <text x="534" y="379">$27</text>
    <text x="610" y="326">5nm</text>
    <text x="610" y="340">$33</text>
    <text x="720" y="388">3nm</text>
    <text x="720" y="402">$24</text>
    <text x="796" y="408">N2 est.</text>
    <text x="796" y="422">$25</text>
    <text x="784" y="314" fill="#235f99">18A est.</text>
    <text x="784" y="328" fill="#235f99">$33</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="11">
    <rect x="148" y="350" width="256" height="60" rx="6" fill="#fff4f2" stroke="#dd7a74"/>
    <text x="164" y="373" fill="#8d302a" font-weight="700">Density helps, wafer price pushes back</text>
    <text x="164" y="392" fill="#8d302a">N2 is smaller than 3nm, but USD 30k wafers flatten cost.</text>
  </g>

  <text x="70" y="488" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="12">This is a lower-bound area proxy. It excludes registers, routing, control, SRAM, yield, packaging, and design cost.</text>
</svg>
