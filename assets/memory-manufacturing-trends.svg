<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" role="img" aria-labelledby="title desc">
  <title id="title">Memory and manufacturing economics are the hidden bottleneck</title>
  <desc id="desc">Four small charts showing on-chip SRAM raw cost proxy, commodity DRAM price per GB, HBM price per bandwidth, and wafer price by semiconductor process node.</desc>
  <rect width="960" height="700" fill="#f8fafc"/>

  <text x="60" y="44" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Memory and manufacturing economics are the hidden bottleneck</text>
  <text x="60" y="72" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="13">Concrete anchors across SRAM, commodity DRAM, HBM bandwidth, and wafer price. Price panels use log scale.</text>

  <g>
    <rect x="50" y="104" width="410" height="230" rx="8" fill="#ffffff" stroke="#d7dee8"/>
    <rect x="500" y="104" width="410" height="230" rx="8" fill="#ffffff" stroke="#d7dee8"/>
    <rect x="50" y="404" width="410" height="230" rx="8" fill="#ffffff" stroke="#d7dee8"/>
    <rect x="500" y="404" width="410" height="230" rx="8" fill="#ffffff" stroke="#d7dee8"/>
  </g>

  <g fill="#172033" font-family="Inter, Arial, sans-serif">
    <text x="72" y="132" font-size="16" font-weight="700">On-chip SRAM cost proxy</text>
    <text x="522" y="132" font-size="16" font-weight="700">Commodity DRAM price/capacity</text>
    <text x="72" y="432" font-size="16" font-weight="700">HBM price/bandwidth</text>
    <text x="522" y="432" font-size="16" font-weight="700">Advanced wafer price</text>
  </g>
  <g fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="12">
    <text x="72" y="151">Raw bitcell USD/MB lower-bound proxy</text>
    <text x="522" y="151">Cheapest listed DRAM USD/GB</text>
    <text x="72" y="451">Modeled HBM USD per TB/s</text>
    <text x="522" y="451">Foundry sale price per 300 mm wafer</text>
  </g>

  <g stroke="#e5ebf3" stroke-width="1">
    <line x1="85" y1="130" x2="85" y2="300"/>
    <line x1="85" y1="300" x2="425" y2="300"/>
    <line x1="535" y1="130" x2="535" y2="300"/>
    <line x1="535" y1="300" x2="875" y2="300"/>
    <line x1="85" y1="430" x2="85" y2="600"/>
    <line x1="85" y1="600" x2="425" y2="600"/>
    <line x1="535" y1="430" x2="535" y2="600"/>
    <line x1="535" y1="600" x2="875" y2="600"/>
    <line x1="85" y1="215" x2="425" y2="215"/>
    <line x1="535" y1="215" x2="875" y2="215"/>
    <line x1="85" y1="515" x2="425" y2="515"/>
    <line x1="535" y1="515" x2="875" y2="515"/>
  </g>

  <polyline points="85.0,174.5 279.3,237.3 327.9,185.2 425.0,161.3" fill="none" stroke="#d1495b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="535.0,171.5 616.0,238.4 777.9,273.0 875.0,269.5" fill="none" stroke="#2f80ed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="85.0,522.1 153.0,497.5 357.0,467.1 425.0,485.0" fill="none" stroke="#8c5fbf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="535.0,571.3 729.3,490.7 777.9,448.3 875.0,438.6" fill="none" stroke="#2e8b57" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g stroke="#ffffff" stroke-width="2">
    <g fill="#d1495b">
      <circle cx="85.0" cy="174.5" r="5"/>
      <circle cx="279.3" cy="237.3" r="5"/>
      <circle cx="327.9" cy="185.2" r="5"/>
      <circle cx="425.0" cy="161.3" r="5"/>
    </g>
    <g fill="#2f80ed">
      <circle cx="535.0" cy="171.5" r="5"/>
      <circle cx="616.0" cy="238.4" r="5"/>
      <circle cx="777.9" cy="273.0" r="5"/>
      <circle cx="875.0" cy="269.5" r="5"/>
    </g>
    <g fill="#8c5fbf">
      <circle cx="85.0" cy="522.1" r="5"/>
      <circle cx="153.0" cy="497.5" r="5"/>
      <circle cx="357.0" cy="467.1" r="5"/>
      <circle cx="425.0" cy="485.0" r="5"/>
    </g>
    <g fill="#2e8b57">
      <circle cx="535.0" cy="571.3" r="5"/>
      <circle cx="729.3" cy="490.7" r="5"/>
      <circle cx="777.9" cy="448.3" r="5"/>
      <circle cx="875.0" cy="438.6" r="5"/>
    </g>
  </g>

  <g fill="#172033" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">
    <text x="94" y="170">28nm</text>
    <text x="94" y="184">$0.045/MB</text>
    <text x="246" y="235">7nm</text>
    <text x="246" y="249">$0.030</text>
    <text x="335" y="181">5nm</text>
    <text x="335" y="195">$0.042</text>
    <text x="378" y="156">3nm/N2</text>
    <text x="386" y="170">$0.049</text>

    <text x="548" y="194">2005</text>
    <text x="548" y="208">$185/GB</text>
    <text x="625" y="234">2010</text>
    <text x="625" y="248">$12.2</text>
    <text x="743" y="269">2020</text>
    <text x="743" y="283">$3.0</text>
    <text x="838" y="266">2026</text>
    <text x="838" y="280">$3.45</text>

    <text x="94" y="518">HBM2e</text>
    <text x="94" y="532">$209/TB/s</text>
    <text x="160" y="493">HBM3</text>
    <text x="160" y="507">$264</text>
    <text x="318" y="462">HBM3e</text>
    <text x="318" y="476">$352</text>
    <text x="376" y="482">HBM4</text>
    <text x="376" y="496">$297</text>

    <text x="546" y="568">28nm</text>
    <text x="546" y="582">$3k</text>
    <text x="698" y="487">7nm</text>
    <text x="698" y="501">$9.3k</text>
    <text x="786" y="444">5nm</text>
    <text x="786" y="458">$17.0k</text>
    <text x="836" y="434">3nm</text>
    <text x="836" y="448">$19.5k</text>
  </g>

  <g fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="11">
    <text x="85" y="318">2010</text>
    <text x="402" y="318">2024</text>
    <text x="535" y="318">2005</text>
    <text x="852" y="318">2026</text>
    <text x="85" y="618">2021</text>
    <text x="402" y="618">2026</text>
    <text x="535" y="618">2010</text>
    <text x="852" y="618">2024</text>
  </g>

  <text x="60" y="668" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="12">SRAM proxy excludes periphery, redundancy, yield, cache tags, routing, and design cost; it is a lower-bound area economics signal, not product cost.</text>
</svg>
