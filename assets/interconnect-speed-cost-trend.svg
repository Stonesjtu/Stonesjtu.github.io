<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Scale-out interconnect speed and dollar-per-speed trend</title>
  <desc id="desc">Dual-axis line chart. Scale-out switch port speed rises from 10 gigabits per second in 2008 to 800 gigabits per second in 2026, while estimated switch dollars per gigabit falls from about 72 dollars to about one dollar.</desc>
  <defs>
    <style>
      .bg { fill: #fbfaf7; }
      .grid { stroke: #ded9cf; stroke-width: 1; }
      .axis { stroke: #59534a; stroke-width: 1.2; }
      .label { fill: #403b35; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; }
      .small { fill: #5f574d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; }
      .title { fill: #2f2a25; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 24px; font-weight: 700; }
      .subtitle { fill: #665d52; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }
      .speed { fill: none; stroke: #16835f; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .cost { fill: none; stroke: #c24a3a; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .speed-dot { fill: #16835f; stroke: #fbfaf7; stroke-width: 2; }
      .cost-dot { fill: #c24a3a; stroke: #fbfaf7; stroke-width: 2; }
      .note { fill: #756c61; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="520" rx="0"/>

  <text class="title" x="92" y="36">Scale-out speed vs switch $/Gb/s</text>
  <text class="subtitle" x="92" y="58">Port speed and switch dollar-per-Gb/s are log-scaled; prices are chassis-only public-listing proxies.</text>

  <line class="grid" x1="92" y1="81" x2="700" y2="81"/>
  <line class="grid" x1="92" y1="135" x2="700" y2="135"/>
  <line class="grid" x1="92" y1="189" x2="700" y2="189"/>
  <line class="grid" x1="92" y1="242" x2="700" y2="242"/>
  <line class="grid" x1="92" y1="296" x2="700" y2="296"/>
  <line class="grid" x1="92" y1="350" x2="700" y2="350"/>
  <line class="grid" x1="92" y1="420" x2="700" y2="420"/>

  <line class="axis" x1="92" y1="64" x2="92" y2="438"/>
  <line class="axis" x1="700" y1="64" x2="700" y2="438"/>
  <line class="axis" x1="92" y1="438" x2="700" y2="438"/>

  <text class="label" x="92" y="474" text-anchor="middle">2008</text>
  <text class="label" x="261" y="474" text-anchor="middle">2013</text>
  <text class="label" x="430" y="474" text-anchor="middle">2018</text>
  <text class="label" x="599" y="474" text-anchor="middle">2023</text>
  <text class="label" x="700" y="474" text-anchor="middle">2026</text>

  <text class="small" x="40" y="425" text-anchor="end">10G</text>
  <text class="small" x="40" y="247" text-anchor="end">100G</text>
  <text class="small" x="40" y="194" text-anchor="end">200G</text>
  <text class="small" x="40" y="140" text-anchor="end">400G</text>
  <text class="small" x="40" y="86" text-anchor="end">800G</text>
  <text class="label" x="18" y="255" transform="rotate(-90 18 255)" text-anchor="middle">Port speed</text>

  <path class="speed" d="M 92 421 L 295 242 L 430 189 L 565 135 L 700 81"/>
  <circle class="speed-dot" cx="92" cy="421" r="6"/>
  <circle class="speed-dot" cx="295" cy="242" r="6"/>
  <circle class="speed-dot" cx="430" cy="189" r="6"/>
  <circle class="speed-dot" cx="565" cy="135" r="6"/>
  <circle class="speed-dot" cx="700" cy="81" r="6"/>

  <path class="cost" d="M 92 90 L 329 340 L 430 355 L 565 402 L 700 419"/>
  <circle class="cost-dot" cx="92" cy="90" r="6"/>
  <circle class="cost-dot" cx="329" cy="340" r="6"/>
  <circle class="cost-dot" cx="430" cy="355" r="6"/>
  <circle class="cost-dot" cx="565" cy="402" r="6"/>
  <circle class="cost-dot" cx="700" cy="419" r="6"/>

  <rect x="104" y="76" width="250" height="54" rx="6" fill="#fff7ef" stroke="#ead8c4"/>
  <line x1="120" y1="94" x2="166" y2="94" class="cost"/>
  <circle class="cost-dot" cx="143" cy="94" r="5"/>
  <text class="label" x="176" y="99">switch $/Gb/s proxy</text>
  <line x1="120" y1="116" x2="166" y2="116" class="speed"/>
  <circle class="speed-dot" cx="143" cy="116" r="5"/>
  <text class="label" x="176" y="121">front-panel port speed</text>

  <text class="small" x="92" y="450" text-anchor="middle">10G</text>
  <text class="small" x="295" y="228" text-anchor="middle">100G</text>
  <text class="small" x="430" y="175" text-anchor="middle">200G</text>
  <text class="small" x="565" y="121" text-anchor="middle">400G</text>
  <text class="small" x="700" y="67" text-anchor="middle">800G</text>

  <text class="small" x="104" y="78">$72/Gb/s</text>
  <text class="small" x="341" y="326">$2.85</text>
  <text class="small" x="442" y="374">$2.34</text>
  <text class="small" x="577" y="392">$1.28</text>
  <text class="small" x="613" y="432">$1.02/Gb/s</text>

  <text class="note" x="92" y="500">Proxy uses switch chassis price / (ports x nominal port speed). It excludes optics, cables, NICs, support, power, and topology oversubscription.</text>
</svg>
