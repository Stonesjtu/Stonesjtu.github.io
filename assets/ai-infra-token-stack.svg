<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Token cost is shaped by the whole AI infrastructure stack</title>
  <desc id="desc">A stack diagram showing how algorithms, models, serving, frameworks, kernels, compilers, accelerators, memory, networking, and manufacturing all influence token economics.</desc>
  <rect width="960" height="560" fill="#f8fafc"/>
  <text x="70" y="44" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Tokenomics is a full-stack systems problem</text>
  <text x="70" y="76" fill="#5d6b82" font-family="Inter, Arial, sans-serif" font-size="15">A token is cheap only when every layer cooperates.</text>
  <rect x="80" y="108" width="800" height="64" rx="8" fill="#ffffff" stroke="#d7dee8"/>
  <text x="106" y="147" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Useful intelligence per dollar, watt, second, and engineering cycle</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="120" y="206" width="220" height="62" rx="8" fill="#fff4f2" stroke="#dd7a74"/>
    <text x="144" y="232" fill="#8d302a" font-size="15" font-weight="700">Algorithm + objective</text>
    <text x="144" y="254" fill="#8d302a" font-size="13">data, loss, verification</text>
    <rect x="370" y="206" width="220" height="62" rx="8" fill="#f0f7ff" stroke="#6ba9e8"/>
    <text x="394" y="232" fill="#235f99" font-size="15" font-weight="700">Model architecture</text>
    <text x="394" y="254" fill="#235f99" font-size="13">parameters, sparsity, context</text>
    <rect x="620" y="206" width="220" height="62" rx="8" fill="#f3f5ff" stroke="#8c93d9"/>
    <text x="644" y="232" fill="#4e559d" font-size="15" font-weight="700">Serving policy</text>
    <text x="644" y="254" fill="#4e559d" font-size="13">batching, routing, cache</text>
    <rect x="120" y="310" width="220" height="62" rx="8" fill="#eefaf2" stroke="#69bb7f"/>
    <text x="144" y="336" fill="#26713b" font-size="15" font-weight="700">Framework + compiler</text>
    <text x="144" y="358" fill="#26713b" font-size="13">graphs, shapes, lowering</text>
    <rect x="370" y="310" width="220" height="62" rx="8" fill="#fff9e8" stroke="#d7aa45"/>
    <text x="394" y="336" fill="#7c5a12" font-size="15" font-weight="700">Kernel + runtime</text>
    <text x="394" y="358" fill="#7c5a12" font-size="13">attention, GEMM, collectives</text>
    <rect x="620" y="310" width="220" height="62" rx="8" fill="#f3f0ff" stroke="#a98cd9"/>
    <text x="644" y="336" fill="#62449a" font-size="15" font-weight="700">Accelerator backend</text>
    <text x="644" y="358" fill="#62449a" font-size="13">datatypes, tiling, streams</text>
    <rect x="120" y="414" width="220" height="62" rx="8" fill="#edf7f7" stroke="#65aeb0"/>
    <text x="144" y="440" fill="#1f6668" font-size="15" font-weight="700">Memory + network</text>
    <text x="144" y="462" fill="#1f6668" font-size="13">HBM, NVLink, RDMA</text>
    <rect x="370" y="414" width="220" height="62" rx="8" fill="#fff2e9" stroke="#d88d59"/>
    <text x="394" y="440" fill="#824416" font-size="15" font-weight="700">Chip design</text>
    <text x="394" y="462" fill="#824416" font-size="13">compute, SRAM, packaging</text>
    <rect x="620" y="414" width="220" height="62" rx="8" fill="#f5f5f5" stroke="#9aa3ae"/>
    <text x="644" y="440" fill="#44505f" font-size="15" font-weight="700">Manufacturing</text>
    <text x="644" y="462" fill="#44505f" font-size="13">yield, process, supply</text>
  </g>
  <path d="M230 268 L230 310" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M480 268 L480 310" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M730 268 L730 310" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M230 372 L230 414" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M480 372 L480 414" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M730 372 L730 414" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M340 237 L370 237" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 237 L620 237" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M340 341 L370 341" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 341 L620 341" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M340 445 L370 445" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 445 L620 445" stroke="#7b8798" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L6,3 z" fill="#7b8798"/>
    </marker>
  </defs>
</svg>
