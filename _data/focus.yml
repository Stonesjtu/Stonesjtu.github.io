- title: Large-Model AI Infrastructure
  text: LLM/VLM serving, inference deployment, training-stack integration, GUI Agent model rollout, and production performance and cost optimization.
- title: Mobile and Cloud AI Systems
  text: End-to-end assistant infrastructure across mobile-side and cloud-side execution paths, with attention to latency, reliability, and heterogeneous resources.
- title: AI Compiler Systems
  text: NPU operator development, graph optimization, fusion, code generation, memory planning, and hardware consistency validation.
- title: Speech Chip Algorithms
