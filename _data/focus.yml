- title: Distributed Training
  text: PyTorch training infrastructure, VeOmni and verl stack integration, model parallelism, speech criteria, large-vocabulary language models, and throughput tuning.
- title: Hardware-Aware Performance
  text: Kernel tuning, data layout, tiling search, polyhedral scheduling, cost modeling, and CPU-GPU heterogeneous acceleration.
